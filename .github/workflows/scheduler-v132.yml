name: Release Scheduler V1.32

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply V1.32 iOS shortcut fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('app.js')
          s = app.read_text()

          old = "let appReady = false;\nlet resumeRefreshTimer = null;"
          new = "let appReady = false;\nlet resumeRefreshTimer = null;\nif('scrollRestoration' in history) history.scrollRestoration = 'manual';"
          if old not in s:
              raise SystemExit('Missing app state anchor')
          s = s.replace(old, new, 1)

          old = "  focusTodayOnLaunch();\n  render();\n  appReady = true;"
          new = "  focusTodayOnLaunch();\n  render();\n  appReady = true;\n  forceTodayRailPosition();"
          if old not in s:
              raise SystemExit('Missing init anchor')
          s = s.replace(old, new, 1)

          old = "function setupAppResume(){\n  document.addEventListener('visibilitychange', ()=>{\n    if(!document.hidden) refreshTodayAfterResume();\n  });\n  window.addEventListener('pageshow', event=>{\n    if(event.persisted) refreshTodayAfterResume();\n  });\n}\nfunction refreshTodayAfterResume(){\n  if(!appReady || document.hidden) return;\n  clearTimeout(resumeRefreshTimer);\n  resumeRefreshTimer=setTimeout(()=>{\n    focusTodayOnLaunch();\n    render();\n  }, 75);\n}\n"
          new = "function setupAppResume(){\n  document.addEventListener('visibilitychange', ()=>{\n    if(!document.hidden) refreshTodayAfterResume();\n  });\n  window.addEventListener('pageshow', ()=>refreshTodayAfterResume());\n  window.addEventListener('focus', ()=>refreshTodayAfterResume());\n}\nfunction refreshTodayAfterResume(){\n  if(!appReady || document.hidden) return;\n  clearTimeout(resumeRefreshTimer);\n  resumeRefreshTimer=setTimeout(()=>{\n    focusTodayOnLaunch();\n    render();\n    forceTodayRailPosition();\n  }, 50);\n}\nfunction forceTodayRailPosition(){\n  const today=isoDate(new Date());\n  const place=()=>{\n    state.pendingScrollDate=today;\n    scrollRailToDate(today);\n  };\n  requestAnimationFrame(()=>{\n    place();\n    requestAnimationFrame(place);\n  });\n  [120,300,700,1200].forEach(ms=>setTimeout(place,ms));\n}\n"
          if old not in s:
              raise SystemExit('Missing resume block anchor')
          s = s.replace(old, new, 1)
          app.write_text(s)

          index = Path('index.html')
          s = index.read_text()
          for old, new in [
              ('styles.css?v=1.31', 'styles.css?v=1.32'),
              ('V1.31 · shared weekly planner', 'V1.32 · shared weekly planner'),
              ('app.js?v=1.31', 'app.js?v=1.32'),
              ('manifest.webmanifest?v=1.16', 'manifest.webmanifest?v=1.32'),
          ]:
              if old not in s:
                  raise SystemExit(f'Missing index anchor: {old}')
              s = s.replace(old, new, 1)
          index.write_text(s)

          manifest = Path('manifest.webmanifest')
          s = manifest.read_text()
          old = '"start_url": "./index.html",'
          new = '"start_url": "./index.html?v=1.32",'
          if old not in s:
              raise SystemExit('Missing manifest start_url anchor')
          manifest.write_text(s.replace(old, new, 1))
          PY

          node --check app.js

      - name: Commit release and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/scheduler-v132.yml
          git add app.js index.html manifest.webmanifest
          git commit -m "Release Scheduler V1.32"
          git push
