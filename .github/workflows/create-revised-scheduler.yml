name: Create Revised Scheduler
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/create-revised-scheduler.yml'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create isolated scheduler copy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p revised-scheduler
          cp index.html app.js styles.css config.js manifest.webmanifest seed-events.js revised-scheduler/
          cp our-scheduler-icon.svg our-scheduler-icon-180.png our-scheduler-icon-192.png our-scheduler-icon-512.png revised-scheduler/
          python3 - <<'PY'
          from pathlib import Path
          p = Path('revised-scheduler/index.html')
          s = p.read_text()
          s = s.replace('<title>Our Scheduler</title>', '<title>Our Scheduler Revised Test</title>')
          s = s.replace('<h1>Our Scheduler</h1>', '<h1>Our Scheduler Revised Test</h1>')
          s = s.replace('V1.32 · shared weekly planner', 'Rebuild V0.1 · isolated test copy')
          p.write_text(s)

          p = Path('revised-scheduler/manifest.webmanifest')
          s = p.read_text()
          s = s.replace('"name": "Our Scheduler"', '"name": "Our Scheduler Revised Test"')
          s = s.replace('"short_name": "Scheduler"', '"short_name": "Scheduler Test"')
          s = s.replace('"start_url": "./index.html"', '"start_url": "./index.html?rebuild=0.1"')
          p.write_text(s)
          PY
      - name: Validate copied app
        shell: bash
        run: |
          set -euo pipefail
          node --check revised-scheduler/app.js
          test -f revised-scheduler/index.html
          test -f revised-scheduler/app.js
          test -f revised-scheduler/styles.css
          test -f revised-scheduler/config.js
          test -f revised-scheduler/manifest.webmanifest
          test -f revised-scheduler/seed-events.js
          test -f revised-scheduler/our-scheduler-icon.svg
          test -f revised-scheduler/our-scheduler-icon-180.png
          test -f revised-scheduler/our-scheduler-icon-192.png
          test -f revised-scheduler/our-scheduler-icon-512.png
      - name: Commit isolated copy and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/create-revised-scheduler.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add revised-scheduler .github/workflows/create-revised-scheduler.yml
          git commit -m 'Add isolated revised scheduler test copy'
          git push