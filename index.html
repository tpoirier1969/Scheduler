<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Our Scheduler</title>
  <link rel="icon" href="our-scheduler-icon.svg?v=1.5" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=1.10" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1.5"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand-lockup">
      <img src="our-scheduler-icon.svg?v=1.5" alt="" class="app-icon" />
      <div>
        <h1>Our Scheduler</h1>
        <p class="version">V1.10 · shared weekly planner</p>
      </div>
    </div>
    <button id="addEventBtn" class="primary compact-add">+ Add</button>
  </header>

  <nav class="toolbar" aria-label="Calendar controls">
    <button id="navMenuBtn" class="mobile-menu-button" type="button" aria-expanded="false" aria-controls="toolbarMenu">☰</button>
    <button id="weekRangeBtn" class="week-range-button" type="button">This week</button>
    <div class="week-nav">
      <button id="prevWeekBtn" aria-label="Previous week">‹</button>
      <button id="todayBtn">Today</button>
      <button id="nextWeekBtn" aria-label="Next week">›</button>
    </div>
    <div id="toolbarMenu" class="toolbar-stack">
      <button id="menuTodayBtn" class="menu-today" type="button">Today</button>
      <label class="jump-label">Jump to week <input id="weekPicker" type="date" /></label>
      <label class="calendar-label">Calendar
        <select id="calendarSelect" aria-label="Calendar filter">
          <option value="all">All</option>
          <option value="donna">Donna</option>
          <option value="tod">Tod</option>
          <option value="frank">Frank</option>
          <option value="shared">Shared</option>
        </select>
      </label>
      <select id="zoomSelect" class="mobile-zoom" aria-label="Zoom level">
        <option value="compact" selected>Compact</option>
        <option value="detailed">Detailed</option>
      </select>
    </div>
  </nav>

  <section id="densityPanel" class="density-panel" aria-live="polite"></section>

  <main>
    <div id="calendarGrid" class="calendar-grid" aria-label="Weekly calendar"></div>
    <section class="print-overview">
      <h2>Weekly overview</h2>
      <div id="printList"></div>
    </section>
  </main>

  <dialog id="eventDetailsDialog" class="details-dialog">
    <section class="details-panel">
      <div class="details-title-row">
        <h2>Event Details</h2>
        <button id="closeDetailsBtn" type="button" aria-label="Close details">×</button>
      </div>
      <div id="eventDetailsContent" class="details-content"></div>
      <menu class="details-actions">
        <button id="editDetailsBtn" type="button">Edit Event</button>
        <button id="deleteDetailsBtn" type="button" class="danger">Delete Event</button>
      </menu>
    </section>
  </dialog>

  <dialog id="eventDialog">
    <form method="dialog" id="eventForm" class="event-form">
      <div class="dialog-title-row"><h2 id="dialogTitle">+ Add</h2><label class="date-inline">Date <input id="eventDate" type="date" required /></label></div>
      <input type="hidden" id="eventId" />
      <label>Title <input id="eventTitle" required /></label>
      <div class="form-row two-col">
        <label>Person
          <select id="personSelect"></select>
        </label>
        <label>Preset
          <select id="presetSelect"></select>
        </label>
      </div>
      <div class="form-row two-col">
        <label>Start <input id="startTime" type="time" step="1800" required /></label>
        <label>End <input id="endTime" type="time" step="1800" required /></label>
      </div>
      <label>Color</label>
      <div id="colorPalette" class="color-palette"></div>
      <label>Status
        <select id="statusSelect">
          <option value="scheduled">Scheduled</option>
          <option value="no_show">No-show</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </label>
      <fieldset>
        <legend>Repeat</legend>
        <label><input id="repeatToggle" type="checkbox" /> Recurring block</label>
        <div id="repeatControls" class="repeat-controls hidden">
          <label>Frequency
            <select id="repeatFrequency">
              <option value="weekly">Weekly</option>
              <option value="daily">Daily</option>
            </select>
          </label>
          <label>Until <input id="repeatUntil" type="date" /></label>
          <div class="weekday-picker">
            <label><input type="checkbox" value="1" /> Mon</label>
            <label><input type="checkbox" value="2" /> Tue</label>
            <label><input type="checkbox" value="3" /> Wed</label>
            <label><input type="checkbox" value="4" /> Thu</label>
            <label><input type="checkbox" value="5" /> Fri</label>
            <label><input type="checkbox" value="6" /> Sat</label>
            <label><input type="checkbox" value="0" /> Sun</label>
          </div>
        </div>
      </fieldset>
      <label>Notes <textarea id="eventNotes" rows="3"></textarea></label>
      <menu>
        <button type="button" id="deleteEventBtn" class="danger hidden">Delete</button>
        <button type="button" id="cancelEventBtn">Cancel</button>
        <button id="saveEventBtn" value="default" class="primary">Save</button>
      </menu>
    </form>
  </dialog>

  <script src="seed-events.js?v=1.5"></script>
  <script src="app.js?v=1.10"></script>
</body>
</html>
